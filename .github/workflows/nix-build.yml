name: "CI: Nix build check"
on:
  pull_request:
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix-build.yml"
  push:
    branches: [main]
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix-build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: homeConfigurations.nazozokc.activationPackage
          - os: ubuntu-24.04-arm
            target: homeConfigurations.nazozokc-aarch64.activationPackage
          - os: macos-latest
            target: darwinConfigurations.nazozokc.system
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: nix flake check
        run: nix flake check --no-build
      - name: Build config (dry-run)
        run: nix build .#${{ matrix.target }} --dry-run
